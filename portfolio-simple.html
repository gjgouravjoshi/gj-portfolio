<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gourav Joshi - Graphic Designer Portfolio</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230a0a0f'/%3E%3Ctext x='31' y='42' text-anchor='middle' font-family='Arial,sans-serif' font-size='27' font-weight='900' fill='%23f4f1ff'%3EGJ%3C/text%3E%3Ccircle cx='51' cy='45' r='5' fill='%23ff2d78'/%3E%3C/svg%3E">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --card: #171720;
    --card-2: #1f1f2a;
    --pink: #ff2d78;
    --cyan: #00e5ff;
    --yellow: #ffe600;
    --whatsapp: #25d366;
    --instagram: #e4405f;
    --behance: #1769ff;
    --linkedin: #0a66c2;
    --youtube: #ff0033;
    --text: #f4f1ff;
    --muted: #a4a0b8;
    --soft: rgba(244,241,255,0.68);
    --line: rgba(255,255,255,0.09);
    --page-pad: clamp(16px, 5vw, 72px);
    --grid-gap: clamp(10px, 1.6vw, 16px);
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    background:
      radial-gradient(circle at 80% 10%, rgba(255,45,120,0.12), transparent 30vw),
      radial-gradient(circle at 8% 38%, rgba(0,229,255,0.08), transparent 26vw),
      var(--bg);
    color: var(--text);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    text-rendering: geometricPrecision;
    overflow-x: hidden;
  }
  a { color: inherit; text-decoration: none; }
  img { display: block; max-width: 100%; }

  .nav {
    position: sticky;
    top: 0;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 24px;
    padding: 18px var(--page-pad);
    background: rgba(10,10,15,0.92);
    border-bottom: 1px solid var(--line);
    backdrop-filter: blur(16px);
  }
  .brand {
    font-size: 1.25rem;
    font-weight: 900;
    letter-spacing: 0.08em;
  }
  .brand span { color: var(--pink); }
  .nav-links {
    display: flex;
    align-items: center;
    flex: 1 1 auto;
    justify-content: center;
    gap: clamp(14px, 2.4vw, 24px);
    min-width: 0;
    margin: 0;
    padding: 0;
    list-style: none;
  }
  .nav-links a {
    color: var(--muted);
    font-size: 0.78rem;
    font-weight: 800;
    letter-spacing: 0.11em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .nav-links a:hover { color: var(--text); }
  .nav-cta,
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
    min-height: 42px;
    padding: 0 18px;
    border: 1px solid transparent;
    border-radius: 999px;
    font-size: 0.84rem;
    font-weight: 850;
    letter-spacing: 0.02em;
    transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
  }
  .btn svg,
  .nav-cta svg,
  .menu-toggle svg {
    width: 17px;
    height: 17px;
    flex: 0 0 auto;
  }
  .menu-toggle {
    display: none;
    place-items: center;
    width: 42px;
    height: 42px;
    padding: 0;
    background: rgba(23,23,32,0.94);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--text);
    cursor: pointer;
    transition: transform 0.2s ease, border-color 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
  }
  .menu-toggle:hover,
  .menu-toggle[aria-expanded="true"] {
    color: var(--pink);
    border-color: rgba(255,45,120,0.58);
    box-shadow: 0 0 22px rgba(255,45,120,0.22);
    transform: translateY(-1px);
  }
  .nav-cta,
  .btn-email {
    background: var(--pink);
    color: white;
    box-shadow: 0 0 0 rgba(255,45,120,0);
  }
  .btn-whatsapp {
    background: transparent;
    border-color: rgba(37,211,102,0.48);
    color: var(--whatsapp);
  }
  .nav-cta:hover,
  .btn:hover {
    transform: translateY(-2px);
  }
  .nav-cta:hover,
  .btn-email:hover {
    background: var(--whatsapp);
    border-color: var(--whatsapp);
    box-shadow: 0 0 28px rgba(37,211,102,0.34);
  }
  .btn-whatsapp:hover {
    background: var(--pink);
    border-color: var(--pink);
    color: white;
    box-shadow: 0 0 28px rgba(255,45,120,0.34);
  }
  button.btn {
    cursor: pointer;
    font-family: inherit;
  }

  .hero {
    min-height: min(86vh, 900px);
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(240px, 360px);
    align-items: center;
    gap: clamp(24px, 4.5vw, 64px);
    padding: clamp(46px, 7vw, 90px) var(--page-pad);
    border-bottom: 1px solid var(--line);
  }
  .hero > * {
    min-width: 0;
  }
  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    color: var(--pink);
    font-size: 0.75rem;
    font-weight: 900;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }
  .eyebrow::before {
    content: "";
    width: 28px;
    height: 2px;
    background: var(--pink);
  }
  .badge {
    width: fit-content;
    margin-bottom: 22px;
    padding: 9px 16px;
    background: rgba(255,45,120,0.12);
    border: 1px solid rgba(255,45,120,0.32);
    border-radius: 999px;
    color: var(--pink);
    font-size: 0.78rem;
    font-weight: 850;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease, background 0.25s ease;
  }
  .badge:hover {
    transform: translateY(-2px);
    background: rgba(255,45,120,0.18);
    border-color: rgba(255,45,120,0.65);
    box-shadow: 0 0 32px rgba(255,45,120,0.32), inset 0 0 18px rgba(255,45,120,0.08);
  }
  .hero-name {
    color: var(--text);
    font-size: clamp(1.18rem, 2vw, 1.65rem);
    font-weight: 950;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  h1,
  h2 {
    margin: 0;
    font-weight: 950;
    letter-spacing: 0;
    text-transform: uppercase;
    max-width: 100%;
    overflow-wrap: normal;
  }
  h1 {
    max-width: min(880px, 100%);
    margin-top: 12px;
    font-size: clamp(3.4rem, 8.8vw, 8.1rem);
    line-height: 0.9;
  }
  .outline {
    color: white;
    -webkit-text-stroke: 2px rgba(244,241,255,0.9);
  }
  .accent { color: var(--pink); }
  .hero-copy,
  .section-copy,
  .step p,
  .cta p {
    color: var(--soft);
    line-height: 1.7;
  }
  .hero-copy {
    max-width: min(560px, 100%);
    margin: 26px 0 0;
    font-size: 1rem;
  }
  .skills {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin: 28px 0 34px;
  }
  .skill {
    padding: 8px 12px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--muted);
    font-size: 0.78rem;
    font-weight: 800;
    transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
  }
  .skill:hover {
    transform: translateY(-2px);
  }
  .skill-photoshop:hover {
    background: #001e36;
    border-color: #31a8ff;
    color: #31a8ff;
    box-shadow: 0 0 22px rgba(49,168,255,0.18);
  }
  .skill-illustrator:hover {
    background: #330000;
    border-color: #ff9a00;
    color: #ff9a00;
    box-shadow: 0 0 22px rgba(255,154,0,0.2);
  }
  .skill-coreldraw:hover {
    background: #062414;
    border-color: #7ac943;
    color: #7ac943;
    box-shadow: 0 0 22px rgba(122,201,67,0.2);
  }
  .skill-aftereffects:hover {
    background: #00005b;
    border-color: #9999ff;
    color: #c8c8ff;
    box-shadow: 0 0 22px rgba(153,153,255,0.18);
  }
  .actions,
  .social-links {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
  }
  .hero-media {
    position: relative;
    display: grid;
    place-items: center;
    min-width: 0;
  }
  .profile-card {
    width: min(100%, 340px);
    aspect-ratio: 4 / 5;
    border-color: rgba(255,45,120,0.16);
    box-shadow: 0 26px 80px rgba(255,45,120,0.12);
  }
  .floating-socials {
    position: absolute;
    right: 0;
    bottom: 18px;
    display: grid;
    gap: 10px;
  }
  .social-dot {
    display: grid;
    place-items: center;
    width: 42px;
    height: 42px;
    background: rgba(23,23,32,0.94);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: white;
    font-size: 0.75rem;
    font-weight: 900;
    text-transform: uppercase;
    transition: transform 0.2s ease, color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
  }
  .social-dot svg {
    width: 18px;
    height: 18px;
  }
  .social-dot:hover {
    color: var(--social-color, var(--pink));
    border-color: color-mix(in srgb, var(--social-color, var(--pink)) 62%, transparent);
    box-shadow: 0 0 24px color-mix(in srgb, var(--social-color, var(--pink)) 32%, transparent);
    transform: translateY(-2px) scale(1.04);
  }

  .section {
    padding: clamp(54px, 8vw, 92px) var(--page-pad);
    border-bottom: 1px solid var(--line);
  }
  .section:nth-of-type(odd) { background: var(--surface); }
  .section-head {
    max-width: min(680px, 100%);
    margin-bottom: 34px;
  }
  h2 {
    margin-top: 12px;
    font-size: clamp(2.4rem, 6vw, 4.4rem);
    line-height: 0.96;
  }
  h2 span { color: var(--pink); }
  .section-copy { margin: 12px 0 0; }

  .image-card {
    position: relative;
    display: block;
    overflow: hidden;
    width: 100%;
    max-width: 100%;
    min-height: 150px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 8px;
    isolation: isolate;
    box-shadow: 0 18px 50px rgba(0,0,0,0.18);
    transform-origin: center;
    min-width: 0;
    transition: border-color 0.24s ease, box-shadow 0.24s ease;
  }
  .image-card::after {
    content: "";
    position: absolute;
    inset: 0;
    z-index: 2;
    border: 1px solid rgba(255,45,120,0.65);
    border-radius: inherit;
    box-shadow: 0 0 32px rgba(255,45,120,0.32), inset 0 0 18px rgba(255,45,120,0.08), inset 0 0 0 1px rgba(255,255,255,0.1);
    opacity: 0;
    transition: opacity 0.24s ease;
    pointer-events: none;
  }
  .image-card img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: center;
    transition: transform 0.35s ease, filter 0.35s ease;
  }
  .image-card:hover img {
    filter: saturate(1.14) contrast(1.04);
  }
  .image-upload {
    position: absolute;
    inset: 0;
    z-index: 3;
    opacity: 0;
    cursor: pointer;
  }
  .logo-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: var(--grid-gap);
  }
  .logo-grid .image-card {
    aspect-ratio: 1;
    min-height: 0;
    background: rgba(255,255,255,0.035);
  }
  .logo-grid .image-card img {
    object-fit: contain;
    padding: 18px;
  }
  .social-primary-grid,
  .social-secondary-grid {
    display: grid;
    gap: var(--grid-gap);
    align-items: stretch;
    padding: clamp(10px, 1.8vw, 18px);
    background: rgba(255,255,255,0.055);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 18px;
  }
  .social-primary-grid {
    grid-template-columns: minmax(260px, 0.95fr) minmax(0, 1.9fr);
  }
  .social-secondary-grid {
    grid-template-columns: minmax(0, 1.9fr) minmax(260px, 0.95fr);
    margin-top: var(--grid-gap);
  }
  .social-post-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: var(--grid-gap);
  }
  .social-post-grid .image-card {
    aspect-ratio: 4 / 5;
  }
  .phone-card {
    aspect-ratio: 9 / 16;
    background: transparent;
    border-color: transparent;
    box-shadow: none;
    min-height: 100%;
  }
  .insta-card {
    aspect-ratio: 4 / 5;
    min-height: 100%;
    background: transparent;
    border-color: transparent;
    box-shadow: none;
  }
  .phone-card img,
  .insta-card img {
    object-fit: contain;
    pointer-events: none;
  }
  .pack-grid,
  .thumb-grid,
  .print-grid {
    display: grid;
    gap: var(--grid-gap);
  }
  .pack-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .pack-grid .image-card { aspect-ratio: 1; }
  .thumb-featured { aspect-ratio: 16 / 9; margin-bottom: 14px; }
  .thumb-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .thumb-grid .image-card { aspect-ratio: 16 / 9; }
  .print-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
  .print-grid .image-card:first-child {
    min-height: 0;
  }
  .print-grid .image-card:not(:first-child) { aspect-ratio: 4 / 3; }
  .print-grid .image-card { aspect-ratio: 4 / 3; }

  .process-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: var(--grid-gap);
  }
  .step {
    position: relative;
    overflow: hidden;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 22px;
    isolation: isolate;
    box-shadow: 0 18px 50px rgba(0,0,0,0.18);
    transform-origin: center;
    transition: border-color 0.24s ease, box-shadow 0.24s ease;
  }
  .step::after {
    content: "";
    position: absolute;
    inset: 0;
    z-index: 2;
    border: 1px solid rgba(255,45,120,0.65);
    border-radius: inherit;
    box-shadow: 0 0 32px rgba(255,45,120,0.32), inset 0 0 18px rgba(255,45,120,0.08), inset 0 0 0 1px rgba(255,255,255,0.1);
    opacity: 0;
    transition: opacity 0.24s ease;
    pointer-events: none;
  }
  .step-num {
    color: rgba(255,45,120,0.32);
    font-size: 2.4rem;
    font-weight: 950;
    line-height: 1;
  }
  .step h3 {
    margin: 16px 0 8px;
    font-size: 1rem;
  }
  .step p {
    margin: 0;
    font-size: 0.9rem;
  }

  .cta {
    padding: clamp(64px, 9vw, 110px) var(--page-pad);
    text-align: center;
    border-bottom: 1px solid var(--line);
  }
  .cta .eyebrow { justify-content: center; }
  .cta h2 {
    margin: 16px auto 10px;
    font-size: clamp(3.6rem, 10vw, 7.5rem);
  }
  .cta p { margin: 0 0 28px; }
  .cta .actions { justify-content: center; }
  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    padding: 26px var(--page-pad);
    color: var(--muted);
    font-size: 0.86rem;
  }
  .footer a:hover { color: var(--text); }
  .footer-social {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    color: var(--muted);
    transition: color 0.2s ease, transform 0.2s ease;
  }
  .footer-social svg {
    width: 16px;
    height: 16px;
    color: white;
    transition: color 0.2s ease;
  }
  .footer .footer-social:hover {
    color: var(--social-color, var(--text));
    transform: translateY(-1px);
  }
  .footer .footer-social:hover svg {
    color: var(--social-color, var(--text));
  }

  .hire-modal {
    position: fixed;
    inset: 0;
    z-index: 60;
    display: grid;
    place-items: center;
    padding: clamp(14px, 3vw, 28px);
  }
  .hire-modal[hidden] {
    display: none;
  }
  .modal-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(5,5,9,0.78);
    backdrop-filter: blur(12px);
  }
  .hire-panel {
    position: relative;
    z-index: 1;
    width: min(100%, 760px);
    max-height: min(92vh, 780px);
    overflow: auto;
    padding: clamp(22px, 4vw, 34px);
    background: rgba(17,17,24,0.98);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    box-shadow: 0 26px 90px rgba(0,0,0,0.58), 0 0 34px rgba(255,45,120,0.18);
  }
  .modal-close {
    position: absolute;
    top: 16px;
    right: 16px;
    display: grid;
    place-items: center;
    width: 40px;
    height: 40px;
    padding: 0;
    background: rgba(255,255,255,0.055);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--text);
    cursor: pointer;
    transition: transform 0.2s ease, border-color 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
  }
  .modal-close svg {
    width: 18px;
    height: 18px;
  }
  .modal-close:hover,
  .modal-close:focus-visible {
    color: var(--pink);
    border-color: rgba(255,45,120,0.58);
    box-shadow: 0 0 22px rgba(255,45,120,0.22);
    transform: translateY(-1px);
  }
  .hire-panel h2 {
    margin: 12px 48px 18px 0;
    font-size: clamp(2.35rem, 6vw, 4.5rem);
  }
  .hire-form {
    display: grid;
    gap: 16px;
  }
  .form-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px;
  }
  .field {
    display: grid;
    gap: 7px;
  }
  .field-full {
    grid-column: 1 / -1;
  }
  .field label {
    color: var(--muted);
    font-size: 0.75rem;
    font-weight: 850;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .field input,
  .field select,
  .field textarea {
    width: 100%;
    min-width: 0;
    min-height: 46px;
    padding: 12px 13px;
    background: rgba(10,10,15,0.92);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    color: var(--text);
    font: inherit;
    transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
  }
  .field textarea {
    min-height: 118px;
    resize: vertical;
  }
  .field input:focus,
  .field select:focus,
  .field textarea:focus {
    outline: none;
    background: rgba(14,14,21,0.98);
    border-color: rgba(255,45,120,0.62);
    box-shadow: 0 0 0 3px rgba(255,45,120,0.14);
  }
  .field ::placeholder {
    color: rgba(164,160,184,0.64);
  }
  .form-status {
    min-height: 24px;
    margin: 0;
    color: var(--soft);
    font-size: 0.9rem;
    line-height: 1.5;
  }
  .form-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: flex-start;
  }
  body.modal-open {
    overflow: hidden;
  }

  .reveal {
    opacity: 0;
    transform: translateY(30px) scale(0.975);
    transition: opacity 0.72s ease, transform 0.72s cubic-bezier(0.2, 0.8, 0.2, 1);
    transition-delay: var(--delay, 0ms);
    will-change: opacity, transform;
  }
  .reveal.is-visible {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
  .scale-reveal {
    transform: translateY(20px) scale(0.94);
  }
  .image-card.reveal {
    transition: opacity 0.72s ease, transform 0.72s cubic-bezier(0.2, 0.8, 0.2, 1), border-color 0.24s ease, box-shadow 0.24s ease;
  }
  .step.reveal {
    transition: opacity 0.72s ease, transform 0.72s cubic-bezier(0.2, 0.8, 0.2, 1), border-color 0.24s ease, box-shadow 0.24s ease;
  }
  .image-card.reveal.is-visible:is(:hover, :focus-visible) {
    z-index: 5;
    transform: translateY(-4px) scale(1.035);
    border-color: rgba(255,45,120,0.65);
    box-shadow: 0 0 32px rgba(255,45,120,0.32), inset 0 0 18px rgba(255,45,120,0.08), 0 20px 54px rgba(0,0,0,0.34);
  }
  .image-card.reveal.is-visible:is(:hover, :focus-visible)::after {
    opacity: 1;
  }
  .step.reveal.is-visible:is(:hover, :focus-within) {
    z-index: 5;
    transform: translateY(-4px) scale(1.035);
    border-color: rgba(255,45,120,0.65);

      linkedin: `<svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M4.98 3.5a2.48 2.48 0 1 1 0 4.96 2.48 2.48 0 0 1 0-4.96ZM3.2 9.3h3.56V21H3.2V9.3Zm6.07 0h3.41v1.6h.05c.48-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.45V21h-3.56v-5.76c0-1.37-.02-3.14-1.91-3.14-1.92 0-2.21 1.5-2.21 3.04V21H9.27V9.3Z"/></svg>`,
      youtube: `<svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M21.58 7.2a2.75 2.75 0 0 0-1.93-1.94C17.94 4.8 12 4.8 12 4.8s-5.94 0-7.65.46A2.75 2.75 0 0 0 2.42 7.2 28.77 28.77 0 0 0 2 12a28.77 28.77 0 0 0 .42 4.8 2.75 2.75 0 0 0 1.93 1.94c1.71.46 7.65.46 7.65.46s5.94 0 7.65-.46a2.75 2.75 0 0 0 1.93-1.94A28.77 28.77 0 0 0 22 12a28.77 28.77 0 0 0-.42-4.8ZM10 15.25v-6.5L15.6 12 10 15.25Z"/></svg>`
    };
    return icons[name] || "";
  }

  function actionButtons() {
    return `
      <button class="btn btn-email hire-form-trigger" type="button">${iconSvg("mail")}${esc(DATA.contact.emailLabel)}</button>
      <a class="btn btn-whatsapp" href="${esc(DATA.contact.whatsappHref)}" target="_blank" rel="noopener">${iconSvg("whatsapp")}${esc(DATA.contact.whatsappLabel)}</a>
    `;
  }

  function imageCard(item, extraClass = "", index = 0) {
    const href = readyLink(item.href);
    const hasLinkSlot = Object.prototype.hasOwnProperty.call(item, "href");
    const image = `
        <img src="${esc(item.image)}" data-fallback="${esc(item.fallback || "")}" alt="${esc(item.title)}" loading="lazy" decoding="async">
    `;

    if (href) {
      return `
      <a class="image-card thumbnail-link reveal scale-reveal ${extraClass}" href="${esc(href)}" target="_blank" rel="noopener" aria-label="Open ${esc(item.title)}" style="--delay:${Math.min(index * 45, 360)}ms">
        ${image}
      </a>
    `;
    }

    if (hasLinkSlot) {
      return `
      <article class="image-card reveal scale-reveal ${extraClass}" style="--delay:${Math.min(index * 45, 360)}ms">
        ${image}
      </article>
    `;
    }

    return `
      <article class="image-card reveal scale-reveal ${extraClass}" style="--delay:${Math.min(index * 45, 360)}ms">
        ${image}
        
      </article>
    `;
  }

  function phoneCard(item, index = 0) {
    return `
      <article class="image-card phone-card reveal scale-reveal" style="--delay:${Math.min(index * 45, 360)}ms">
        <img src="${esc(item.image)}" data-fallback="${esc(item.fallback || "")}" alt="${esc(item.title)}" loading="lazy" decoding="async">
        
      </article>
    `;
  }

  function sectionTitle(section) {
    return `${esc(section.title)} <span>${esc(section.accent)}</span>`;
  }

  function renderGallery(section) {
    if (section.layout === "logos") {
      return `<div class="logo-grid">${section.items.map((item, index) => imageCard(item, "", index)).join("")}</div>`;
    }

    if (section.layout === "social") {
      return `
        <div class="social-primary-grid">
          ${phoneCard(section.phone, 0)}
          <div class="social-post-grid">
            ${section.primaryPosts.map((item, index) => imageCard(item, "", index + 1)).join("")}
          </div>
        </div>
        <div class="social-secondary-grid">
          <div class="social-post-grid">
            ${section.secondaryPosts.map((item, index) => imageCard(item, "", index)).join("")}
          </div>
          ${imageCard(section.instagramMockup, "insta-card", section.secondaryPosts.length)}
        </div>
      `;
    }

    if (section.layout === "pack") {
      return `<div class="pack-grid">${section.items.map((item, index) => imageCard(item, "", index)).join("")}</div>`;
    }

    if (section.layout === "thumbs") {
      return `
        ${imageCard(section.featured, "thumb-featured", 0)}
        <div class="thumb-grid">${section.items.map((item, index) => imageCard(item, "", index)).join("")}</div>
      `;
    }

    if (section.layout === "print") {
      return `<div class="print-grid">${section.items.map((item, index) => imageCard(item, "", index)).join("")}</div>`;
    }

    return "";
  }

  function render() {
    document.title = DATA.metaTitle;
    $("#brand").innerHTML = `${esc(DATA.brand)}<span>${esc(DATA.brandAccent)}</span>`;
    $("#navLinks").innerHTML = DATA.nav.map((item) =>
      `<li><a href="${esc(item.href)}">${esc(item.label)}</a></li>`
    ).join("");
    $("#navCta").href = "#hireForm";
    $("#navCta").classList.add("hire-form-trigger");
    $("#navCta").innerHTML = `${iconSvg("mail")}Hire Me`;

    $("#heroBadge").textContent = DATA.hero.badge;
    $("#heroName").textContent = DATA.hero.name;
    $("#heroTitle").innerHTML = DATA.hero.titleLines.map((line) =>
      `<div class="${esc(line.className || "")}">${esc(line.text)}</div>`
    ).join("");
    $("#heroCopy").textContent = DATA.hero.copy;
    $("#skills").innerHTML = DATA.hero.skills.map((skill) =>
      `<span class="skill skill-${esc(skill.key)}">${esc(skill.label)}</span>`
    ).join("");
    $("#heroActions").innerHTML = actionButtons();
    $("#profileImage").innerHTML = imageCard(DATA.hero.profileImage, "profile-card", 0);
    $("#heroSocials").innerHTML = DATA.socials.map((item) =>
      `<a class="social-dot" href="${esc(item.href)}" target="_blank" rel="noopener" aria-label="${esc(item.label)}" style="--social-color:${esc(item.color)}">${iconSvg(item.icon)}</a>`
    ).join("");

    $("#portfolioSections").innerHTML = DATA.sections.map((section) => `
      <section class="section" id="${esc(section.id)}">
        <div class="section-head reveal">
          <div class="eyebrow">${esc(section.eyebrow)}</div>
          <h2>${sectionTitle(section)}</h2>
          ${section.copy ? `<p class="section-copy">${esc(section.copy)}</p>` : ""}
        </div>
        ${renderGallery(section)}
      </section>
    `).join("");

    $("#processEyebrow").textContent = DATA.process.eyebrow;
    $("#processTitle").innerHTML = `${esc(DATA.process.title)} <span>${esc(DATA.process.accent)}</span>`;
    $("#processGrid").innerHTML = DATA.process.steps.map((step, index) => `
      <article class="step reveal scale-reveal" style="--delay:${index * 70}ms">
        <div class="step-num">${String(index + 1).padStart(2, "0")}</div>
        <h3>${esc(step.title)}</h3>
        <p>${esc(step.copy)}</p>
      </article>
    `).join("");

    $("#ctaEyebrow").textContent = DATA.cta.eyebrow;
    $("#ctaTitle").innerHTML = `${esc(DATA.cta.title)} <span class="outline">${esc(DATA.cta.accent)}</span>`;
    $("#ctaCopy").textContent = DATA.cta.copy;
    $("#ctaActions").innerHTML = actionButtons();
    $("#footerCopy").textContent = DATA.footer;
    $("#footerSocials").innerHTML = DATA.socials.map((item) =>
      `<a class="footer-social" href="${esc(item.href)}" target="_blank" rel="noopener" style="--social-color:${esc(item.color)}">${iconSvg(item.icon)}<span>${esc(item.label)}</span></a>`
    ).join("");
    setupResponsiveMenu();
    setupHireForm();
    observeReveals();
  }

  function getHireMessage() {
    const form = $("#hireForm");
    const data = new FormData(form);
    const lines = [
      `Name: ${data.get("name") || ""}`,
      `Email: ${data.get("email") || ""}`,
      `Phone: ${data.get("phone") || ""}`,
      `Project: ${data.get("project") || ""}`,
      `Budget: ${data.get("budget") || ""}`,
      `Timeline: ${data.get("timeline") || ""}`,
      "",
      "Message:",
      data.get("message") || ""
    ];
    return lines.join("\n");
  }

  function openHireForm() {
    const modal = $("#hireModal");
    if (!modal) return;
    modal.hidden = false;
    document.body.classList.add("modal-open");
    window.setTimeout(() => {
      const firstField = $("#clientName");
      if (firstField) firstField.focus();
    }, 40);
  }

  function closeHireForm() {
    const modal = $("#hireModal");
    if (!modal || modal.hidden) return;
    modal.hidden = true;
    document.body.classList.remove("modal-open");
  }

  function setupHireForm() {
    const form = $("#hireForm");
    const modal = $("#hireModal");
    const status = $("#hireFormStatus");
    const submit = $("#hireSubmit");
    const whatsapp = $("#hireWhatsapp");
    if (!form || !modal || form.dataset.ready === "true") return;

    submit.innerHTML = `${iconSvg("mail")}Send Enquiry`;
    whatsapp.innerHTML = `${iconSvg("whatsapp")}Send on WhatsApp`;
    form.dataset.ready = "true";

    document.addEventListener("click", (event) => {
      if (event.target.closest(".hire-form-trigger")) {
        event.preventDefault();
        openHireForm();
      }
      if (event.target.closest("[data-close-hire]")) {
        closeHireForm();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeHireForm();
    });

    whatsapp.addEventListener("click", () => {
      if (!form.reportValidity()) return;
      const text = `Hi Gourav, I want to hire you.\n\n${getHireMessage()}`;
      const phone = DATA.contact.whatsappHref.replace("https://wa.me/", "").replace(/\D/g, "");
      window.open(`https://wa.me/${phone}?text=${encodeURIComponent(text)}`, "_blank", "noopener");
      status.textContent = "WhatsApp enquiry opened.";
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      if (!form.reportValidity()) return;

      const data = new FormData(form);
      const message = getHireMessage();
      submit.disabled = true;
      status.textContent = "Preparing enquiry...";

      if (HIRE_FORM_ENDPOINT) {
        try {
          const response = await fetch(HIRE_FORM_ENDPOINT, {
            method: "POST",
            headers: { Accept: "application/json" },
            body: data
          });
          if (!response.ok) throw new Error("Form submit failed");
          form.reset();
          status.textContent = "Enquiry sent successfully.";
          submit.disabled = false;
          return;
        } catch (error) {
          status.textContent = "Email draft opened instead.";
        }
      }

      const email = DATA.contact.emailHref.replace(/^mailto:/, "");
      const subject = `Portfolio enquiry from ${data.get("name") || "website"}`;
      window.location.href = `mailto:${email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(message)}`;
      status.textContent = "Email draft opened.";
      submit.disabled = false;
    });
  }

  function setupResponsiveMenu() {
    const nav = $(".nav");
    const toggle = $("#menuToggle");
    const links = $("#navLinks");
    if (!nav || !toggle || !links || toggle.dataset.ready === "true") return;

    const closeMenu = () => {
      nav.classList.remove("nav-open");
      toggle.setAttribute("aria-expanded", "false");
      toggle.setAttribute("aria-label", "Open menu");
    };
    const toggleMenu = () => {
      const isOpen = nav.classList.toggle("nav-open");
      toggle.setAttribute("aria-expanded", String(isOpen));
      toggle.setAttribute("aria-label", isOpen ? "Close menu" : "Open menu");
    };

    toggle.dataset.ready = "true";
    toggle.addEventListener("click", toggleMenu);
    links.addEventListener("click", (event) => {
      if (event.target.closest("a")) closeMenu();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeMenu();
    });
    window.addEventListener("resize", () => {
      if (window.innerWidth > 980) closeMenu();
    });
  }

  function observeReveals() {
    const reveals = document.querySelectorAll(".reveal");
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          entry.target.classList.add("is-visible");
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.14, rootMargin: "0px 0px -40px" });

    reveals.forEach((element) => observer.observe(element));
  }

  document.addEventListener("error", (event) => {
    if (!event.target.matches("img[data-fallback]")) return;
    const fallback = event.target.dataset.fallback;
    if (!fallback || event.target.src === fallback) return;
    event.target.src = fallback;
  }, true);

  document.addEventListener("change", (event) => {
    if (!event.target.matches(".image-upload")) return;
    const file = event.target.files && event.target.files[0];
    if (!file) return;

    const img = event.target.closest(".image-card").querySelector("img");
    const reader = new FileReader();
    reader.onload = () => {
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });

  render();
</script>
</body>
</html>
